  <text x="350" y="330" font-family="system-ui" font-size="11" fill="#64748b" text-anchor="middle">2024-03</text>
  <text x="550" y="330" font-family="system-ui" font-size="11" fill="#64748b" text-anchor="middle">2024-04</text>
  <text x="750" y="330" font-family="system-ui" font-size="11" fill="#64748b" text-anchor="middle">2024-07</text>
  <text x="950" y="330" font-family="system-ui" font-size="11" fill="#64748b" text-anchor="middle">2024-10</text>

  <!-- Tick marks -->
  <line x1="150" y1="295" x2="150" y2="305" stroke="#475569" stroke-width="2"/>
  <line x1="350" y1="295" x2="350" y2="305" stroke="#475569" stroke-width="2"/>
  <line x1="550" y1="295" x2="550" y2="305" stroke="#475569" stroke-width="2"/>
  <line x1="750" y1="295" x2="750" y2="305" stroke="#475569" stroke-width="2"/>
  <line x1="950" y1="295" x2="950" y2="305" stroke="#475569" stroke-width="2"/>

  <!-- Event nodes -->
  <!-- Event 1 -->
  <line x1="200" y1="200" x2="200" y2="295" stroke="#3b82f6" stroke-width="1" stroke-dasharray="4"/>
  <circle cx="200" cy="200" r="14" fill="#3b82f6"/>
  <text x="200" y="180" text-anchor="middle" font-family="system-ui" font-size="10" fill="#93c5fd">加沙冲突升级</text>

