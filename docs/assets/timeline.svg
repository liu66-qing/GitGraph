  <text x="700" y="190" text-anchor="middle" font-family="system-ui" font-size="10" fill="#6ee7b7">安理会决议</text>

  <!-- Event 5 -->
  <line x1="900" y1="170" x2="900" y2="295" stroke="#8b5cf6" stroke-width="1" stroke-dasharray="4"/>
  <circle cx="900" cy="170" r="15" fill="#8b5cf6"/>
  <text x="900" y="148" text-anchor="middle" font-family="system-ui" font-size="10" fill="#c4b5fd">黎巴嫩冲突</text>

  <!-- Legend -->
  <rect x="60" y="380" width="300" height="90" fill="#1e293b" rx="8"/>
  <circle cx="85" cy="405" r="6" fill="#3b82f6"/>
  <text x="100" y="409" font-family="system-ui" font-size="11" fill="#94a3b8">Political Event</text>
  <circle cx="85" cy="430" r="6" fill="#ef4444"/>
  <text x="100" y="434" font-family="system-ui" font-size="11" fill="#94a3b8">Military Action</text>
  <circle cx="200" cy="405" r="6" fill="#f59e0b"/>
  <text x="215" y="409" font-family="system-ui" font-size="11" fill="#94a3b8">Retaliation</text>
  <circle cx="200" cy="430" r="6" fill="#10b981"/>
  <text x="215" y="434" font-family="system-ui" font-size="11" fill="#94a3b8">Diplomatic</text>
  <text x="85" y="460" font-family="system-ui" font-size="10" fill="#64748b">Node size = impact score | Arrow = causal link</text>

  <!-- Source badges -->
  <rect x="800" y="380" width="340" height="90" fill="#1e293b" rx="8"/>
  <text x="820" y="405" font-family="system-ui" font-size="11" font-weight="600" fill="#e2e8f0">Sources</text>
  <rect x="820" y="415" width="60" height="20" rx="4" fill="#166534"/>
  <text x="850" y="429" text-anchor="middle" font-family="system-ui" font-size="9" fill="#86efac">Reuters</text>
  <rect x="890" y="415" width="50" height="20" rx="4" fill="#1e3a5f"/>
  <text x="915" y="429" text-anchor="middle" font-family="system-ui" font-size="9" fill="#93c5fd">AP</text>
  <rect x="950" y="415" width="60" height="20" rx="4" fill="#4c1d95"/>
  <text x="980" y="429" text-anchor="middle" font-family="system-ui" font-size="9" fill="#c4b5fd">新华社</text>
  <rect x="1020" y="415" width="70" height="20" rx="4" fill="#7c2d12"/>
  <text x="1055" y="429" text-anchor="middle" font-family="system-ui" font-size="9" fill="#fdba74">抖音媒体</text>
  <text x="820" y="455" font-family="system-ui" font-size="10" fill="#64748b">5 sources verified | Confidence: 0.92</text>
