  <text x="420" y="128" text-anchor="middle" font-family="system-ui" font-size="10" fill="#fca5a5">大使馆空袭</text>

  <!-- Causal arrow -->
  <path d="M 434 155 Q 480 130 530 165" fill="none" stroke="#f59e0b" stroke-width="2" marker-end="url(#arrow)"/>
  <defs><marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#f59e0b"/></marker></defs>

  <!-- Event 3 -->
  <line x1="550" y1="160" x2="550" y2="295" stroke="#f59e0b" stroke-width="1" stroke-dasharray="4"/>
  <circle cx="550" cy="160" r="18" fill="#f59e0b"/>
  <text x="550" y="135" text-anchor="middle" font-family="system-ui" font-size="10" fill="#fde68a">伊朗报复性打击</text>
  <text x="550" y="148" text-anchor="middle" font-family="system-ui" font-size="9" fill="#fde68a">300+ 导弹</text>

  <!-- Event 4 -->
