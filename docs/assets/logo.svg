<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06b6d4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="100" cy="100" r="90" fill="url(#grad1)" opacity="0.1"/>

  <!-- Pulse wave -->
  <path d="M 30 100 Q 50 100 60 70 Q 70 40 80 100 Q 90 160 100 100 Q 110 40 120 100 Q 130 130 140 100 L 170 100"
        fill="none" stroke="url(#grad1)" stroke-width="4" stroke-linecap="round"/>

  <!-- Graph nodes -->
  <circle cx="60" cy="70" r="8" fill="url(#grad2)"/>
  <circle cx="100" cy="100" r="10" fill="url(#grad1)"/>
  <circle cx="140" cy="100" r="7" fill="#10b981"/>
  <circle cx="80" cy="130" r="6" fill="#f59e0b"/>
  <circle cx="120" cy="60" r="7" fill="#ef4444"/>

  <!-- Graph edges -->
  <line x1="60" y1="70" x2="100" y2="100" stroke="#6366f1" stroke-width="1.5" opacity="0.6"/>
  <line x1="100" y1="100" x2="140" y2="100" stroke="#6366f1" stroke-width="1.5" opacity="0.6"/>
  <line x1="100" y1="100" x2="80" y2="130" stroke="#6366f1" stroke-width="1.5" opacity="0.4"/>
  <line x1="100" y1="100" x2="120" y2="60" stroke="#6366f1" stroke-width="1.5" opacity="0.6"/>
  <line x1="60" y1="70" x2="120" y2="60" stroke="#6366f1" stroke-width="1" opacity="0.3"/>

  <!-- Text -->
  <text x="100" y="175" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="700" fill="#6366f1">PulseGraph</text>
</svg>
