<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" width="1200" height="700">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <linearGradient id="node1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#6366f1"/>
    </linearGradient>
    <linearGradient id="node2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ef4444"/>
      <stop offset="100%" style="stop-color:#f97316"/>
    </linearGradient>
    <linearGradient id="node3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981"/>
      <stop offset="100%" style="stop-color:#06b6d4"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="700" fill="url(#bg)" rx="12"/>

  <!-- Sidebar -->
  <rect x="0" y="0" width="240" height="700" fill="#1e293b" rx="12"/>
  <text x="30" y="40" font-family="system-ui" font-size="16" font-weight="700" fill="#e2e8f0">PulseGraph</text>
  <rect x="16" y="70" width="208" height="36" rx="6" fill="#334155"/>
  <text x="40" y="93" font-family="system-ui" font-size="13" fill="#94a3b8">Graph Explorer</text>
  <rect x="16" y="114" width="208" height="36" rx="6" fill="transparent"/>
  <text x="40" y="137" font-family="system-ui" font-size="13" fill="#64748b">Query Console</text>
  <rect x="16" y="158" width="208" height="36" rx="6" fill="transparent"/>
  <text x="40" y="181" font-family="system-ui" font-size="13" fill="#64748b">Documents</text>
  <rect x="16" y="202" width="208" height="36" rx="6" fill="transparent"/>
  <text x="40" y="225" font-family="system-ui" font-size="13" fill="#64748b">Timeline</text>
  <rect x="16" y="246" width="208" height="36" rx="6" fill="transparent"/>
  <text x="40" y="269" font-family="system-ui" font-size="13" fill="#64748b">Conflicts</text>

  <!-- Graph edges -->
  <line x1="600" y1="320" x2="450" y2="200" stroke="#3b82f6" stroke-width="2" opacity="0.6"/>
  <line x1="600" y1="320" x2="780" y2="250" stroke="#ef4444" stroke-width="2.5" opacity="0.7"/>
  <line x1="600" y1="320" x2="500" y2="450" stroke="#10b981" stroke-width="1.5" opacity="0.5"/>
  <line x1="600" y1="320" x2="750" y2="430" stroke="#f59e0b" stroke-width="2" opacity="0.6"/>
  <line x1="450" y1="200" x2="780" y2="250" stroke="#6366f1" stroke-width="1" opacity="0.3"/>
  <line x1="780" y1="250" x2="900" y2="350" stroke="#ef4444" stroke-width="1.5" opacity="0.5"/>
  <line x1="500" y1="450" x2="750" y2="430" stroke="#10b981" stroke-width="1" opacity="0.4"/>
  <line x1="450" y1="200" x2="380" y2="350" stroke="#3b82f6" stroke-width="1.5" opacity="0.4"/>
  <line x1="900" y1="350" x2="750" y2="430" stroke="#f59e0b" stroke-width="1" opacity="0.3"/>

  <!-- Central node (country) -->
  <circle cx="600" cy="320" r="35" fill="url(#node2)" opacity="0.9"/>
  <text x="600" y="325" text-anchor="middle" font-family="system-ui" font-size="11" fill="white" font-weight="600">伊朗</text>

  <!-- Node: Israel -->
  <circle cx="780" cy="250" r="30" fill="url(#node2)" opacity="0.9"/>
  <text x="780" y="255" text-anchor="middle" font-family="system-ui" font-size="11" fill="white" font-weight="600">以色列</text>

  <!-- Node: USA -->
  <circle cx="450" cy="200" r="28" fill="url(#node1)" opacity="0.9"/>
  <text x="450" y="205" text-anchor="middle" font-family="system-ui" font-size="11" fill="white" font-weight="600">美国</text>

  <!-- Node: Event -->
  <circle cx="500" cy="450" r="22" fill="#f59e0b" opacity="0.8"/>
  <text x="500" y="455" text-anchor="middle" font-family="system-ui" font-size="9" fill="white">报复打击</text>

  <!-- Node: Organization -->
  <circle cx="750" cy="430" r="20" fill="url(#node3)" opacity="0.8"/>
  <text x="750" y="435" text-anchor="middle" font-family="system-ui" font-size="9" fill="white">哈马斯</text>

  <!-- Node: Russia -->
  <circle cx="380" cy="350" r="24" fill="url(#node1)" opacity="0.8"/>
  <text x="380" y="355" text-anchor="middle" font-family="system-ui" font-size="10" fill="white">俄罗斯</text>

  <!-- Node: UN -->
  <circle cx="900" cy="350" r="22" fill="url(#node3)" opacity="0.8"/>
  <text x="900" y="355" text-anchor="middle" font-family="system-ui" font-size="9" fill="white">联合国</text>

  <!-- Edge labels -->
  <text x="690" y="270" font-family="system-ui" font-size="9" fill="#ef4444" opacity="0.8">CONFLICT_WITH</text>
  <text x="510" y="250" font-family="system-ui" font-size="9" fill="#3b82f6" opacity="0.8">ALLIED_WITH</text>
  <text x="540" y="395" font-family="system-ui" font-size="9" fill="#f59e0b" opacity="0.8">CAUSED</text>

  <!-- Right panel -->
  <rect x="980" y="60" width="200" height="580" fill="#1e293b" rx="8"/>
  <text x="1000" y="90" font-family="system-ui" font-size="12" font-weight="600" fill="#e2e8f0">Entity Details</text>
  <rect x="996" y="105" width="168" height="1" fill="#334155"/>
  <text x="1000" y="130" font-family="system-ui" font-size="11" fill="#94a3b8">Name: 伊朗</text>
  <text x="1000" y="152" font-family="system-ui" font-size="11" fill="#94a3b8">Type: Country</text>
  <text x="1000" y="174" font-family="system-ui" font-size="11" fill="#94a3b8">Relations: 6</text>
  <text x="1000" y="196" font-family="system-ui" font-size="11" fill="#94a3b8">Sources: 4</text>
  <text x="1000" y="230" font-family="system-ui" font-size="12" font-weight="600" fill="#e2e8f0">Reliability</text>
  <rect x="1000" y="240" width="120" height="8" rx="4" fill="#334155"/>
  <rect x="1000" y="240" width="96" height="8" rx="4" fill="#10b981"/>
  <text x="1130" y="248" font-family="system-ui" font-size="10" fill="#94a3b8">0.8</text>
</svg>
