version: "1.0"
name: "extraction_base"
description: "通用中文知识图谱抽取 prompt"

system: |
  你是一个知识图谱抽取引擎。从给定的中文文本中抽取实体和关系。

template: |
  ## 实体类型
  {entity_types}

  ## 关系类型
  {relation_types}

  ## 示例
  {few_shot_examples}

  ## 规则
  1. 只抽取文本中明确提到的事实，不推测
  2. 每个关系必须有 confidence 分数（0.0-1.0）
  3. 如果有时间信息，填入 time_start/time_end（格式 YYYY-MM-DD）
  4. 不确定的时间填 null
  5. 同一个实体可能有多个称呼，放入 aliases

  ## 输出格式（严格 JSON，不要输出其他内容）
  {{
    "entities": [{{"name": "...", "type": "...", "aliases": [], "description": "一句话描述"}}],
    "relations": [{{"source_entity": "...", "target_entity": "...", "relation_type": "...", "temporal_start": null, "temporal_end": null, "confidence": 0.9}}]
  }}

  ## 待抽取文本
  ---
  {text}
  ---
